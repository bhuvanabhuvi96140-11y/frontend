<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - BhuviTrack</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <a href="index.html" class="logo">BhuviTrack</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="auth-links">
            <a href="login.html" class="btn-small">Sign In</a>
            <a href="register.html" class="btn">Register</a>
        </div>
    </nav>
    <div class="container">
        <div class="glass-panel wide">
            <h2 id="form-title">Student Details</h2>
            <form id="edit-form">
                <div class="form-group">
                    <label for="student-name">Full Name</label>
                    <input type="text" id="student-name" name="student-name" required placeholder="e.g. Jane Smith">
                </div>
                <div class="form-group">
                    <label for="student-email">Email Address</label>
                    <input type="email" id="student-email" name="student-email" required placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label for="student-course">Course / Major</label>
                    <input type="text" id="student-course" name="student-course" required
                        placeholder="e.g. Computer Science">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="index.html" class="btn"
                        style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-main);">Cancel</a>
                    <button type="submit" class="btn">Save Student</button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
