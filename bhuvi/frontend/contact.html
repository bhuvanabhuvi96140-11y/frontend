<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BhuviTrack</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <a href="index.html" class="logo">BhuviTrack</a>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="auth-links">
            <a href="login.html" class="btn-small">Sign In</a>
            <a href="register.html" class="btn">Register</a>
        </div>
    </nav>
    <div class="container" style="display: flex; align-items: flex-start; justify-content: center;">
        <div class="glass-panel" style="width: 100%;">
            <h2>Get In Touch</h2>
            <p class="text-center text-sm" style="margin-bottom: 2rem;">
                Have questions about the student portal? Send us a message!
            </p>
            <form id="contact-form">
                <div class="form-group">
                    <label for="contact-name">Name</label>
                    <input type="text" id="contact-name" name="contact-name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="contact-email">Email</label>
                    <input type="email" id="contact-email" name="contact-email" required
                        placeholder="your.email@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
